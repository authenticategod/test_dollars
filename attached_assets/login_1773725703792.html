<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DOLLARS Login</title>
<style>
  /* Body and base styling */
  body {
    background-color: #0a0a0a;
    color: #ccc;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px 20px;
  }

  /* Logo container with fixed size */
  .logo-container {
    width: 400px;
    height: 400px;
    margin: 0 auto 30px;
  }

  /* Logo image scaled to container */
  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Input field styling */
  .input-container {
    margin: 0 auto 15px;
  }

  input[type="text"] {
    border-radius: 15px;
    border: none;
    padding: 8px 15px;
    width: 200px;
    font-size: 16px;
    background-color: #a0a0a0;
    color: black;
  }

  /* Links container */
  .links {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 14px;
  }

  /* Links style */
  .links a {
    color: #888;
    text-decoration: none;
    margin: 0 6px;
    font-weight: normal;
  }
  .links a:hover {
    color: #ddd;
  }
  .links a.faq {
    font-weight: bold;
  }

  /* ENTER button styling */
  button.enter-btn {
    background-color: transparent;
    border: 1px solid white;
    padding: 8px 60px;
    margin-top: 0;
    font-weight: bold;
    color: white;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
  }

  button.enter-btn:hover {
    background-color: rgba(255,255,255,0.1);
  }

  /* Project DOLLARS small button style */
  button.project-btn {
    background-color: black;
    border: 1px solid white;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    color: white;
    cursor: pointer;
    margin-top: 18px;
  }

  button.project-btn:hover {
    background-color: rgba(255,255,255,0.1);
  }

  /* Small code text at bottom */
  .code-text {
    color: #222;
    margin-top: 40px;
    font-size: 12px;
    user-select: text;
  }
</style>
</head>
<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="logo.png" alt="DOLLARS Logo" />
  </div>

  <!-- Input field -->
  <div class="input-container">
    <input type="text" value="ABUSEog" />
  </div>

  <!-- Links -->
  <div class="links">
    Settings - <a href="#" class="faq">FAQ</a> - Chat Rules
  </div>

  <!-- Enter button -->
  <button class="enter-btn">ENTER</button>

  <!-- Project dollars button -->
  <div>
    <button class="project-btn">Project DOLLARS</button>
  </div>

  <!-- Code text at bottom -->
  <div class="code-text">
    d817b32ed5eaa1d473d04ae51467cbf9c6452d0d
  </div>

</body>
</html>
